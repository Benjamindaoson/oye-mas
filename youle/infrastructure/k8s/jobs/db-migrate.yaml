# Pre-deploy migration Job — ArgoCD Sync Hook 调度
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: youle
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: youle-app
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/your-org/youle-backend:0.1.0
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: youle-config }
            - secretRef:    { name: youle-secrets }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
