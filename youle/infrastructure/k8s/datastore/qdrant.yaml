apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: youle
spec:
  serviceName: qdrant
  replicas: 1
  selector: { matchLabels: { app: qdrant } }
  template:
    metadata: { labels: { app: qdrant } }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.0
          ports:
            - { name: http, containerPort: 6333 }
            - { name: grpc, containerPort: 6334 }
          resources:
            requests: { cpu: "300m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 10
  volumeClaimTemplates:
    - metadata: { name: storage }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: qdrant, namespace: youle }
spec:
  selector: { app: qdrant }
  ports:
    - { name: http, port: 6333, targetPort: 6333 }
    - { name: grpc, port: 6334, targetPort: 6334 }
