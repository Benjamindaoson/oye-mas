# 注意:生产建议托管 RDS / 阿里云 RDS PG;此 manifest 仅 staging
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: youle
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          env:
            - { name: POSTGRES_USER, value: youle }
            - { name: POSTGRES_DB,   value: youle }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: youle-secrets, key: POSTGRES_PASSWORD } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432 }]
          resources:
            requests: { cpu: "300m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "youle"] }
            initialDelaySeconds: 10
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 50Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: youle }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
  clusterIP: None
