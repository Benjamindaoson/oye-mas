# 7 个 MCP server — 同一镜像不同 MCP_KIND
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: mcp-search, namespace: youle, labels: { app: mcp-search } }
spec:
  replicas: 1
  selector: { matchLabels: { app: mcp-search } }
  template:
    metadata: { labels: { app: mcp-search } }
    spec:
      containers:
        - name: server
          image: ghcr.io/your-org/youle-mcp:0.1.0
          env: [{ name: MCP_KIND, value: search }, { name: PORT, value: "7001" }]
          envFrom:
            - configMapRef: { name: youle-config }
            - secretRef:    { name: youle-secrets }
          ports: [{ containerPort: 7001 }]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe: { httpGet: { path: /health, port: 7001 }, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 7001 }, periodSeconds: 20 }
---
apiVersion: v1
kind: Service
metadata: { name: mcp-search, namespace: youle }
spec:
  selector: { app: mcp-search }
  ports: [{ port: 7001, targetPort: 7001 }]
