apiVersion: v1
kind: ConfigMap
metadata:
  name: youle-config
  namespace: youle
data:
  ENV: "staging"
  LITELLM_URL: "http://litellm-proxy:4000"
  REDIS_URL: "redis://redis:6379/0"
  DATABASE_URL: "postgresql+asyncpg://youle:youle@postgres:5432/youle"
  OSS_ENDPOINT: "http://minio:9000"
  OSS_BUCKET: "youle"
  QDRANT_URL: "http://qdrant:6333"
  CORS_ORIGINS: "https://youle.example.com"
  AGENT_HEARTBEAT_INTERVAL: "20"
  AGENT_MAX_RETRIES: "2"
  AGENT_RETRY_BASE_SLEEP: "1.0"
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  LOG_LEVEL: "INFO"
---
# 真 secret 由 SealedSecret / external-secrets 注入。这里只是示例骨架,绝不真填值。
apiVersion: v1
kind: Secret
metadata:
  name: youle-secrets
  namespace: youle
  annotations:
    # 用 SealedSecret 加密;生成命令:
    #   kubeseal -f raw-secret.yaml -w sealed-secret.yaml
    "youle.example.com/managed-by": "sealed-secrets"
type: Opaque
stringData:
  JWT_SECRET: "<REPLACE-VIA-SEALED-SECRET>"
  POSTGRES_PASSWORD: "<REPLACE-VIA-SEALED-SECRET>"
  OSS_ACCESS_KEY: "<REPLACE>"
  OSS_SECRET_KEY: "<REPLACE>"
  LITELLM_MASTER_KEY: "<REPLACE>"
  TAVILY_API_KEY: "<REPLACE>"
  VOLCENGINE_TTS_APPID: "<REPLACE>"
  VOLCENGINE_TTS_TOKEN: "<REPLACE>"
  ALIYUN_OSS_ACCESS_KEY_ID: "<REPLACE>"
  ALIYUN_OSS_ACCESS_KEY_SECRET: "<REPLACE>"
  SENTRY_DSN: "<REPLACE>"
