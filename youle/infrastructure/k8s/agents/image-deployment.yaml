apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-image
  namespace: youle
  labels: { app: agent-image, agent: image }
spec:
  replicas: 2
  selector: { matchLabels: { app: agent-image } }
  template:
    metadata:
      labels: { app: agent-image, agent: image }
    spec:
      serviceAccountName: youle-app
      containers:
        - name: agent
          image: ghcr.io/your-org/youle-agent:0.1.0
          env:
            - { name: AGENT_KIND, value: image }
          envFrom:
            - configMapRef: { name: youle-config }
            - secretRef: { name: youle-secrets }
          resources:
            requests: { cpu: "300m", memory: "768Mi" }
            limits:   { cpu: "2000m", memory: "1.5Gi" }
      terminationGracePeriodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: agent-image-hpa, namespace: youle }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: agent-image }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
