apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-text
  namespace: youle
  labels: { app: agent-text, agent: text }
spec:
  replicas: 2
  selector: { matchLabels: { app: agent-text } }
  template:
    metadata:
      labels: { app: agent-text, agent: text }
    spec:
      serviceAccountName: youle-app
      containers:
        - name: agent
          image: ghcr.io/your-org/youle-agent:0.1.0
          env:
            - { name: AGENT_KIND, value: text }
          envFrom:
            - configMapRef: { name: youle-config }
            - secretRef: { name: youle-secrets }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1500m", memory: "1Gi" }
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 20
            periodSeconds: 30
          # readiness 通过 Redis stream agent_heartbeats 间接观测
      terminationGracePeriodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: agent-text-hpa, namespace: youle }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: agent-text }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
