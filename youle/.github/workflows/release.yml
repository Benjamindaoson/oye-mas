name: Release(build images + deploy staging)

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      env:
        description: "目标环境"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/youle

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: youle/infrastructure/Dockerfile.backend
            context: .
          - name: agent
            dockerfile: youle/infrastructure/Dockerfile.agent
            context: .
          - name: mcp
            dockerfile: youle/infrastructure/Dockerfile.mcp
            context: .
          - name: frontend
            dockerfile: youle/infrastructure/Dockerfile.frontend
            context: .
          - name: celery-video
            dockerfile: youle/infrastructure/Dockerfile.celery
            context: youle
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy-staging:
    name: Deploy → staging
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.env == 'staging' || github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.youle.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl + kustomize
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag
        working-directory: youle/infrastructure/k8s
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          [[ -z "$TAG" || "$TAG" == "$GITHUB_REF" ]] && TAG="sha-${GITHUB_SHA::7}"
          sed -i "s/newTag: .*/newTag: $TAG/g" kustomization.yaml

      - name: Apply
        working-directory: youle/infrastructure/k8s
        run: |
          kubectl apply -k . -n youle --record

      - name: Wait rollout
        run: |
          kubectl -n youle rollout status deploy/backend  --timeout=5m
          kubectl -n youle rollout status deploy/agent-text --timeout=5m
          kubectl -n youle rollout status deploy/agent-image --timeout=5m
          kubectl -n youle rollout status deploy/agent-document --timeout=5m
          kubectl -n youle rollout status deploy/agent-av --timeout=5m
          kubectl -n youle rollout status deploy/frontend --timeout=5m

      - name: Smoke
        env:
          BASE_URL: https://staging.youle.example.com
          JWT_TOKEN: ${{ secrets.STAGING_SMOKE_JWT }}
        run: |
          pip install httpx
          python youle/scripts/smoke-prod.py --anti-fraud 3 --detail 1 || exit 1

  deploy-prod:
    name: Deploy → prod
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.env == 'prod'
    environment:
      name: prod
      url: https://youle.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Manual approval gate
        run: |
          echo "Prod deploy 由 environment 的 required reviewers 控制"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag
        working-directory: youle/infrastructure/k8s
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          sed -i "s/newTag: .*/newTag: $TAG/g" kustomization.yaml

      - name: Apply prod
        working-directory: youle/infrastructure/k8s
        run: |
          kubectl apply -k . -n youle --record

      - name: Wait rollout
        run: |
          for d in backend agent-text agent-document agent-image agent-av frontend; do
            kubectl -n youle rollout status deploy/$d --timeout=10m
          done

      - name: Prod smoke(15 次 hero 全绿才算上线)
        env:
          BASE_URL: https://youle.example.com
          JWT_TOKEN: ${{ secrets.PROD_SMOKE_JWT }}
        run: |
          pip install httpx
          python youle/scripts/smoke-prod.py --anti-fraud 10 --detail 5 || exit 1
