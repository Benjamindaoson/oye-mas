skill_id: anti_fraud_video
name: 反诈视频制作
version: "1.0"
description: 自动制作 30-90 秒反诈短视频,适合社区宣传、抖音投放
domain: video
scenario: anti_fraud
creator: platform
visibility: public
created_at: 2026-05-04
updated_at: 2026-05-05

keywords:
  - 反诈
  - 防诈骗
  - 防骗视频
  - 反诈视频
  - anti_fraud
anti_signals:
  - 真人出镜
  - 直播
  - 长视频

inputs_schema:
  - name: 年份
    type: number
    required: true
    default: 2026
    clarification_form: single_select
    options: [2024, 2025, 2026]
  - name: 骗局类型
    type: enum
    required: true
    options: [电信诈骗, 投资理财, 网恋诈骗, 网络洗钱]
    clarification_form: single_select
  - name: 受众
    type: enum
    required: true
    options: [城市老人, 农村老人, 都覆盖]
    default: 都覆盖
    clarification_form: single_select
  - name: 时长
    type: enum
    required: false
    options: [30s, 60s, 90s]
    default: 60s
    clarification_form: single_select
  - name: 开头钩子
    type: text
    required: false
    clarification_form: version_compare
    generate_count: 3

workflow:
  # ━━━ 第 1 步:案例调研 ━━━
  - step_id: research
    agent: agent_1                       # 文字 (ADR-001-rev)
    task_type: web_search
    timeout: 120
    mcp_tools:
      - mcp://search/web_search
      - mcp://search/web_fetch
    prompt_template: |
      给我 10 条 {{年份}} 涉及 {{骗局类型}}、传销、网络洗钱的案件新闻,
      并且罗列涉案金额、新闻简介 50 字。
      标题要有夸张感,模仿抖音标题。
      给我新闻来源网址。
      生成 excel 表格。
      只要有图片的来源。
      对于有图片的新闻来源,记录图片 URL 到 excel 表格单独一列。
    output_format:
      type: structured
      schema:
        columns: [标题, 摘要, 涉案金额, 来源URL, 图片URL]
    routing_hints:
      primary: deepseek-v4-pro
      fallback: [claude-sonnet-4-6]
    quality_check:
      min_rows: 5

  # ━━━ 第 2 步:脚本生成 + HITL gate ━━━
  - step_id: script
    agent: agent_1
    task_type: long_writing
    depends_on: [research]
    timeout: 60
    prompt_template: |
      基于 {{research.output}} 撰写一段反诈视频脚本,
      针对 {{受众}} 受众,时长 {{时长}}。
      开头钩子参考:{{开头钩子}}
      要求:开头有钩子、中间有案例、结尾呼吁警惕。
    output_format:
      type: text
    routing_hints:
      primary: kimi-k2
      fallback: [deepseek-v4-pro, claude-sonnet-4-6]
    hitl_gate:
      type: version_select
      timeout_seconds: 600
      auto_approve_if_user_offline: false

  # ━━━ 第 3 步:图片处理(下载 + 质检)+ HITL gate ━━━
  - step_id: image_process
    agent: agent_3                       # 设计师 (ADR-001-rev)
    task_type: image_download
    depends_on: [research]
    timeout: 120
    parameters:
      check_quality: true
    prompt_template: |
      从 {{research.output.图片URL}} 下载图片,
      过滤无效与低质,保留至少 5 张供视频合成使用。
    output_format:
      type: image_collection
    hitl_gate:
      type: quality_review
      actions: [approve, regenerate_single, replace_with_upload]

  # ━━━ 第 4 步:配乐选择 ━━━
  - step_id: bgm
    agent: agent_4                       # 影音师 (ADR-001-rev)
    task_type: bgm_select
    depends_on: [script]
    timeout: 5
    parameters:
      mood: warning
      duration_field: 时长
    output_format:
      type: audio

  # ━━━ 第 5 步:视频合成(Celery 异步)+ 终审 ━━━
  - step_id: video_compose
    agent: agent_4
    task_type: video_compose
    depends_on: [script, image_process, bgm]
    timeout: 600
    inputs:
      script: "{{script.output}}"
      images: "{{image_process.output}}"
      bgm: "{{bgm.output}}"
    parameters:
      voice: female_warm
      duration_field: 时长
    output_format:
      type: video
    quality_check:
      min_resolution: 1080p
      max_silence_seconds: 2
    hitl_gate:
      type: final_approval
      timeout_seconds: 1800
      # V1 终审仅 [接受][微调][取消],无回滚按钮(中断 C 是 V2)
      actions:
        - {label: "接受,发布", action: approve, default: true}
        - {label: "调字幕样式", action: modify, target_step: video_compose}
        - {label: "换 BGM", action: modify, target_step: bgm}

failure_handling:
  research:
    on_timeout: retry_once
    on_failure: ask_user_to_provide_links
  script:
    on_timeout: switch_to_fallback_model
    on_failure: ask_user_to_simplify
  video_compose:
    on_timeout: notify_user_long_running
    on_failure: ask_user_to_retry

delivery:
  primary_artifact: video_compose
  bundled_artifacts: [research, script, image_process, bgm]
  user_message_template: |
    ✅ 任务完成!共耗时 {{duration}}。
    主成品:反诈视频(mp4),时长 {{时长}}
    附带:调研表 / 脚本 / 配图 / 配乐
